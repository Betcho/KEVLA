# ============================================================
# KEVLA ENGINE EDITOR — Electron Builder Configuration
# ============================================================

appId: com.kevla.editor
productName: KEVLA Editor
description: KEVLA 3D Game Engine Editor
author: KEVLA Engine Team
copyright: Copyright © 2026 KEVLA Engine

# ---- Directories ----
directories:
  buildResources: electron/resources
  output: release

# ---- Files to include in the asar ----
files:
  - from: dist
    to: dist
    filter:
      - "**/*"
  - from: electron
    to: electron
    filter:
      - main.js
      - preload.js
  - package.json

# ---- Extra resources (outside asar) ----
extraResources:
  - from: electron/resources/
    to: resources/
    filter:
      - "**/*"
      - "!README.md"

# ---- Application metadata ----
buildVersion: "1.0.0"
artifactName: "KevlaEditor-${version}-Setup.${ext}"

# ============================================================
# Windows
# ============================================================
win:
  target:
    - target: nsis
      arch:
        - x64
  requestedExecutionLevel: asInvoker
  publisherName: KEVLA Engine

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: KEVLA Editor
  artifactName: "KevlaEditor-${version}-Setup.${ext}"
  installerLanguages:
    - en_US
  language: 0x0409
  warningsAsErrors: false
  deleteAppDataOnUninstall: false
  displayLanguageSelector: false
  menuCategory: KEVLA Engine
  runAfterFinish: true

# ============================================================
# macOS
# ============================================================
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.developer-tools
  hardenedRuntime: true

dmg:
  artifactName: "KevlaEditor-${version}.${ext}"

# ============================================================
# Linux
# ============================================================
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Development
  maintainer: KEVLA Engine Team
  desktop:
    Name: KEVLA Editor
    Comment: KEVLA 3D Game Engine Editor
    Categories: Development;IDE;

appImage:
  artifactName: "KevlaEditor-${version}.${ext}"
